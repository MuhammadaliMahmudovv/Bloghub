version: '3.8'

services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=bloghub_db
      - POSTGRES_USER=bloghub_user
      - POSTGRES_PASSWORD=secure_pg_pass123
    ports:
      - "5432:5432"

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - "${PWD}:/app"
    ports:
      - "8000:8000"
    environment:
      - DB_NAME=bloghub_db
      - DB_USER=bloghub_user
      - DB_PASSWORD=secure_pg_pass123
      - DB_HOST=db
      - DB_PORT=5432
    depends_on:
      - db

volumes:
  postgres_data: