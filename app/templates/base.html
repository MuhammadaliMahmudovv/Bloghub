{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}BlogHub{% endblock %}</title>
    <!-- Подключаем стильный современный шрифт Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <a href="{% url 'main' %}" class="nav-logo">Blog<span>Hub</span></a>
            
            <div class="nav-links">
    {% if request.user.is_authenticated %}
        <!-- Передаем username текущего пользователя в url 'profile' -->
        <a href="{% url 'profile' request.user.username %}" class="btn btn-profile">
            👤 {{ request.user.username }}
        </a>
        <a href="{% url 'create' %}" class="btn btn-primary">Создать статью</a>
        <form action="{% url 'logout' %}" method="post" style="display:inline;">
            {% csrf_token %}
            <button type="submit" class="btn btn-outline">Выйти</button>
        </form>
    {% else %}
        <a href="{% url 'login' %}" class="nav-item">Войти</a>
        <a href="{% url 'register' %}" class="btn btn-primary">Регистрация</a>
    {% endif %}
</div>
        </div>
    </nav>

    <main class="main-content">
        {% block content %}
        {% endblock %}
    </main>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const likeForms = document.querySelectorAll('.like-form');
            
            likeForms.forEach(form => {
                form.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    
                    const button = form.querySelector('.like-btn');
                    const countSpan = button.querySelector('.like-count');
                    
                    if (button.disabled) return;
                    button.disabled = true;
                    
                    try {
                        const url = form.action;
                        const csrfToken = form.querySelector('[name=csrfmiddlewaretoken]').value;
                        
                        const response = await fetch(url, {
                            method: 'POST',
                            headers: {
                                'X-CSRFToken': csrfToken,
                                'X-Requested-With': 'XMLHttpRequest'
                            }
                        });
                        
                        if (response.ok) {
                            // Если произошел редирект на логин, перенаправляем браузер
                            if (response.redirected && response.url.includes('/login')) {
                                window.location.href = response.url;
                                return;
                            }
                            
                            const isLiked = button.classList.contains('liked');
                            let count = parseInt(countSpan.textContent) || 0;
                            
                            if (isLiked) {
                                button.classList.remove('liked');
                                countSpan.textContent = Math.max(0, count - 1);
                            } else {
                                button.classList.add('liked');
                                countSpan.textContent = count + 1;
                            }
                        } else {
                            window.location.reload();
                        }
                    } catch (error) {
                        console.error('Ошибка при отправке лайка:', error);
                        form.submit();
                    } finally {
                        button.disabled = false;
                    }
                });
            });
        });
    </script>
</body>
</html>
